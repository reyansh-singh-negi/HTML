<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List and Tables</title>
</head>
<body>
    <h2>Lists in HTML</h2>
    <h3>Ordered List</h3>
    <ol>
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
    </ol>
    <h3>Unordered List</h3>
    <ul>
        <li>Monday</li>
        <LI>Tuesday</LI>
        <LI>Wednesday</LI>
    </ul>
    <h3>Definition List</h3>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text MarkUp Language</dd>
        <dt>Css</dt>
        <dd>For styling a website</dd>
    </dl>

    <h2>Tables in HTML</h2>

    <TABLE>
        <thead>
            <tr>
            <th>Name</th>
            <th>Gender</th>
            <th>Age</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Reyansh</td>
                <td>Male</td>
                <td>17</td>
            </tr>
            <tr>
                <td>Harsh</td>
                <td>Male</td>
                <td>17</td>
            </tr>
            <tr>
                <td>Saksham</td>
                <td>Female</td>
                <td>4</td>
            </tr>
            <tr>
                <td colspan="3"> END OF THE TABLE</td>
            </tr>
        </tbody>
    </TABLE>
</body>
</html>
