<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Forms in HTML</h1>
    <form action="/submit.php">
        <div>
            <label for="name">Name</label><br>
            <input id="name" type="text" placeholder="Enter Name" required>
        </div><br>

        <div>
            <label for="phone no">Phone No.</label><br>
            <input id="phone" type="tel" placeholder="Enter Phone No." required>
        </div><br>

        <div>
            <label for="password">Password</label><br>
            <input id="password" type="password" placeholder="Enter Password" required>
        </div><br>

        <div>
            <label for="email">Email</label><br>
            <input id="email" type="email" placeholder="Enter Email" required>
        </div><br>

        <div>
            <label for="DOB">Date</label><br>
            <input id="DOB" type="date" placeholder="Enter DOB" required>
        </div><br>

        <div>
            <label for="Gender">Gender</label>
            <select name="Gender" id="Gender" required>
            <option value="" disabled selected>Select Gender</option> 
            <option value="Male">Male</option>   
            <option value="Female">Female</option>
            <option value="Other">Other</option>
            </select>
        </div><br>

        <div>
            <p>Ice Cream Flavour</p>

            <input type="radio" id="Chocolate" value="Chocolate" name="Flavour">
            <label for="Chocolate">Chocolate</label>

            <input type="radio" id="Vanilla" value="Vanilla" name="Flavour">
            <label for="Vanilla">Vanilla</label>

            <input type="radio" id="Butterscotch" value="Butterscotch" name="Flavour">
            <label for="Butterscotch">Butterscotch</label>
            <br>
            <br>
        </div>

         <div>
            <label for="Addons">Addons</label><br>
            <textarea name="Addons" id="Addons" placeholder="Please write any addons you want in your Ice Cream" rows="2" cols="30"></textarea>
        </div><br>

        <div>
        <input type="checkbox" id="TC" required>
        <label for="TC">I agree to the Terms and Conditions</label>
        </div><br>

        <div>
            <button type="reset" >Reset</button>
            <button type="submit">Submit</button>
        </div>

    </form>
</body>
</html>
